<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift — Hostinger Schedule Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #1c2430;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --green: #1a4a2e;
    --green-mid: #238636;
    --green-light: #3fb950;
    --green-text: #7ee787;
    --amber: #4a2e08;
    --amber-mid: #9e6a03;
    --amber-light: #d29922;
    --amber-text: #f0b429;
    --accent: #58a6ff;
    --accent-dim: rgba(88,166,255,0.12);
    --cell-h: 52px;
    --time-w: 64px;
    --day-min: 110px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 28px; height: 28px;
    background: var(--accent-dim);
    border: 1px solid rgba(88,166,255,0.3);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .brand-name { font-weight: 600; font-size: 15px; color: var(--text); letter-spacing: -0.3px; }
  .brand-sub { font-size: 11px; color: var(--text2); margin-left: 2px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .tz-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    background: var(--accent-dim);
    border: 1px solid rgba(88,166,255,0.25);
    border-radius: 20px;
    color: var(--accent);
  }
  .week-nav { display: flex; align-items: center; gap: 6px; }
  .week-nav button {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s;
  }
  .week-nav button:hover { color: var(--text); border-color: var(--accent); }
  .week-label { font-size: 13px; color: var(--text2); min-width: 110px; text-align: center; }
  .btn-add {
    background: var(--green);
    border: 1px solid var(--green-mid);
    color: var(--green-text);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-add:hover { background: rgba(35,134,54,0.3); }

  /* ── Layout ── */
  .layout { display: flex; height: calc(100vh - 56px); overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }
  .form-row { margin-bottom: 10px; }
  .form-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .form-row input, .form-row select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .form-row select option { background: #1c2430; }
  .form-inline { display: flex; gap: 8px; }
  .form-inline .form-row { flex: 1; }
  /* View toggle */
  .view-toggle { display:flex; background:var(--bg3); border:1px solid var(--border2); border-radius:6px; overflow:hidden; }
  .view-btn { background:none; border:none; color:var(--text2); padding:5px 14px; cursor:pointer; font-size:12px; font-weight:500; transition:all .15s; }
  .view-btn.active { background:var(--accent-dim); color:var(--accent); }
  /* Month cell */
  .month-cell {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-height: 70px;
    padding: 6px;
    position: relative;
    transition: border-color .15s;
  }
  .month-cell.other-month { opacity: 0.35; }
  .month-cell.today { border-color: var(--accent); }
  .month-cell.has-work { border-color: transparent; }
  .month-cell.has-work-livechat { background: var(--green); border-color: var(--green-mid); }
  .month-cell.has-work-break    { background: var(--amber); border-color: var(--amber-mid); }
  .month-cell.has-work-training { background: #1a2e4a; border-color: #2958a0; }
  .month-cell.has-work-oneonone { background: #2e1a4a; border-color: #7a3fc0; }
  .month-cell.has-work-meeting  { background: #1a3a3a; border-color: #1d8a8a; }
  .month-cell.has-work-p2p      { background: #2e1a3a; border-color: #9a50c8; }
  .month-cell.has-work-ppp      { background: #1a2a1a; border-color: #50c850; }
  .month-day-num { font-size: 12px; font-weight: 500; color: var(--text2); }
  .month-cell.today .month-day-num { color: var(--accent); }
  .month-cell.has-work-livechat .month-day-num { color: var(--green-text); }
  .month-cell.has-work-break    .month-day-num { color: var(--amber-text); }
  .month-cell.has-work-training .month-day-num { color: #79b8ff; }
  .month-cell.has-work-oneonone .month-day-num { color: #c398f5; }
  .month-cell.has-work-meeting  .month-day-num { color: #56d4d4; }
  .month-cell.has-work-p2p      .month-day-num { color: #d4a0f5; }
  .month-cell.has-work-ppp      .month-day-num { color: #a0f5a0; }
  /* Day pills */
  .day-pill {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    transition: all 0.12s;
  }
  .day-pill:hover { border-color: var(--accent); color: var(--text); }
  .day-pill.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  /* New event type colors */
  .cal-event.type-training { background: #1a2e4a; color: #79b8ff; }
  .cal-event.type-oneonone { background: #2e1a4a; color: #c398f5; }
  .cal-event.type-meeting  { background: #1a3a3a; color: #56d4d4; }
  .cal-event.type-p2p      { background: #2e1a3a; color: #d4a0f5; }
  .cal-event.type-ppp      { background: #1a2a1a; color: #a0f5a0; }
  .shift-dot.training { background: #2958a0; }
  .shift-dot.oneonone { background: #7a3fc0; }
  .shift-dot.meeting  { background: #1d8a8a; }
  .shift-dot.p2p      { background: #9a50c8; }
  .shift-dot.ppp      { background: #50c850; }
  .shift-ph.training { color: #79b8ff; }
  .shift-ph.oneonone { color: #c398f5; }
  .shift-ph.meeting  { color: #56d4d4; }
  .shift-ph.p2p      { color: #d4a0f5; }
  .shift-ph.ppp      { color: #a0f5a0; }
  .btn-submit {
    width: 100%;
    background: var(--green);
    border: 1px solid var(--green-mid);
    color: var(--green-text);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    margin-top: 4px;
    transition: background 0.15s;
  }
  .btn-submit:hover { background: rgba(35,134,54,0.4); }
  .event-list { flex: 1; overflow-y: auto; padding: 12px; }
  .day-group {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .day-group-header {
    padding: 8px 12px 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .shift-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }
  .shift-row:last-child { border-bottom: none; }
  .shift-row:hover { background: rgba(255,255,255,0.03); }
  .shift-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .shift-dot.livechat { background: var(--green-light); }
  .shift-dot.break    { background: var(--amber-light); }
  .shift-times { flex: 1; min-width: 0; }
  .shift-lt { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .shift-ph { font-size: 13px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .shift-ph.livechat { color: var(--green-text); }
  .shift-ph.break    { color: var(--amber-text); }
  .shift-type { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .btn-del {
    background: none; border: none;
    color: var(--text3); cursor: pointer; font-size: 15px; line-height: 1;
    padding: 2px 5px; border-radius: 4px; flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
  }
  .btn-del:hover { color: #f85149; background: rgba(248,81,73,0.1); }
  .empty-state { text-align: center; color: var(--text3); padding: 40px 16px; font-size: 13px; }

  /* ── Calendar Grid ── */
  .calendar-wrap { flex: 1; overflow: auto; }
  .calendar {
    min-width: 600px;
    position: relative;
  }
  .cal-header {
    display: grid;
    position: sticky; top: 0; z-index: 50;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .cal-header-inner {
    display: flex;
  }
  .cal-time-gutter { width: var(--time-w); min-width: var(--time-w); }
  .day-headers { display: flex; flex: 1; }
  .day-col-head {
    flex: 1;
    min-width: var(--day-min);
    padding: 10px 8px 8px;
    border-left: 1px solid var(--border);
    text-align: center;
  }
  .day-name { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .day-num { font-size: 18px; font-weight: 300; color: var(--text); margin-top: 2px; }
  .day-col-head.today .day-num {
    background: var(--accent);
    color: #fff;
    width: 30px; height: 30px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 500;
  }

  .cal-body { display: flex; }
  .time-col { width: var(--time-w); min-width: var(--time-w); }
  .time-cell {
    height: var(--cell-h);
    display: flex; align-items: flex-start;
    padding-top: 2px;
    justify-content: flex-end;
    padding-right: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    border-bottom: 1px solid transparent;
  }
  .days-grid { flex: 1; display: flex; }
  .day-lane {
    flex: 1;
    min-width: var(--day-min);
    border-left: 1px solid var(--border);
    position: relative;
  }
  .hour-cell {
    height: var(--cell-h);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .hour-cell.half-marker::after {
    content: '';
    position: absolute;
    bottom: 50%; left: 0; right: 0;
    border-bottom: 1px dashed var(--border);
  }

  /* ── Events on grid ── */
  .cal-event {
    position: absolute;
    left: 2px; right: 2px;
    border-radius: 0;
    padding: 4px 6px;
    font-size: 11px;
    font-weight: 500;
    overflow: hidden;
    cursor: pointer;
    z-index: 10;
    border: none;
    transition: opacity 0.15s;
  }
  .cal-event:hover { opacity: 0.85; }
  .cal-event.type-livechat {
    background: var(--green);
    color: var(--green-text);
  }
  .cal-event.type-break {
    background: var(--amber);
    color: var(--amber-text);
  }
  .cal-event .ev-title { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; }
  .cal-event .ev-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.8; margin-top: 1px; text-align: right; }

  /* Diagonal wedge overlays are injected as SVG in JS */
  .cal-event .wedge-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    border-radius: 5px;
    overflow: hidden;
  }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 16px; align-items: center;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .legend-dot.green { background: var(--green-light); }
  .legend-dot.amber { background: var(--amber-light); }
  .legend-stripe {
    width: 20px; height: 10px; border-radius: 2px; overflow: hidden; position: relative; background: var(--green);
  }
  .legend-stripe::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg3);
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }

  /* ── Modal ── */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 24px;
    width: 380px;
    max-width: 90vw;
  }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .btn-ghost {
    background: none; border: 1px solid var(--border2);
    color: var(--text2); padding: 6px 14px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .btn-danger {
    background: rgba(248,81,73,0.15); border: 1px solid rgba(248,81,73,0.3);
    color: #f85149; padding: 6px 14px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }

  /* ── Settings ── */
  .settings-toggle {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; font-size: 12px; color: var(--text2);
    padding: 4px 8px; border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    transition: border-color 0.15s;
  }
  .settings-toggle:hover { border-color: var(--border2); }

  .scrollable-sidebar { overflow-y: auto; flex: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 768px) {
    .sidebar { width: 260px; min-width: 260px; }
    :root { --day-min: 90px; --cell-h: 44px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <div class="brand-icon">⇄</div>
    <div>
      <span class="brand-name">Shift</span>
      <span class="brand-sub"> schedule converter</span>
    </div>
  </div>
  <div class="header-right">
    <div class="tz-pill" id="tz-display">LT → PH</div>
    <div class="week-nav">
      <button id="prev-week" title="Previous week">&#8249;</button>
      <span class="week-label" id="week-label"></span>
      <button id="next-week" title="Next week">&#8250;</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-week-view">Week</button>
      <button class="view-btn" id="btn-month-view">Month</button>
    </div>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Settings</div>
      <div class="form-row">
        <label>Source timezone (Hostinger)</label>
        <div style="background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:7px 10px;border-radius:6px;font-size:13px;font-family:'JetBrains Mono',monospace;">Europe/Vilnius (LT)</div>
        <input type="hidden" id="tz-source" value="Europe/Vilnius">
      </div>
      <div class="form-row">
        <label>Your timezone</label>
        <select id="tz-target">
          <option value="Asia/Manila" selected>Asia/Manila (PH +8)</option>
          <option value="Asia/Singapore">Asia/Singapore (SG +8)</option>
          <option value="Asia/Tokyo">Asia/Tokyo (JP +9)</option>
          <option value="Asia/Jakarta">Asia/Jakarta (ID +7)</option>
          <option value="UTC">UTC</option>
        </select>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Add shift block</div>
      <div class="form-row">
        <label>Day of week</label>
        <div id="inp-day-pills" style="display:flex;flex-direction:column;gap:5px;">
          <div style="display:flex;gap:5px;">
            <button type="button" class="day-pill" data-day="0">Mon</button>
            <button type="button" class="day-pill" data-day="1">Tue</button>
            <button type="button" class="day-pill" data-day="2">Wed</button>
            <button type="button" class="day-pill" data-day="3">Thu</button>
            <button type="button" class="day-pill" data-day="4">Fri</button>
          </div>
          <div style="display:flex;gap:5px;">
            <button type="button" class="day-pill" data-day="5">Sat</button>
            <button type="button" class="day-pill" data-day="6">Sun</button>
          </div>
        </div>
      </div>
      <div class="form-inline">
        <div class="form-row">
          <label>Start (LT)</label>
          <input type="text" id="inp-start" value="10:30" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]" maxlength="5" style="font-family:JetBrains Mono,monospace;letter-spacing:1px;">
        </div>
        <div class="form-row">
          <label>End (LT)</label>
          <input type="text" id="inp-end" value="19:30" placeholder="HH:MM" pattern="[0-2][0-9]:[0-5][0-9]" maxlength="5" style="font-family:JetBrains Mono,monospace;letter-spacing:1px;">
        </div>
      </div>
      <div class="form-row">
        <label>Type</label>
        <select id="inp-type">
          <option value="livechat">Live Chat</option>
          <option value="break">Break</option>
          <option value="training">Training</option>
          <option value="oneonone">1-on-1</option>
          <option value="meeting">Meeting</option>
          <option value="p2p">P2P Session</option>
          <option value="ppp">PPP</option>
        </select>
      </div>
      <div class="form-row">
        <label>Label (optional)</label>
        <input type="text" id="inp-label" placeholder="e.g. Live Chat, Break...">
      </div>
      <button class="btn-submit" id="btn-save-event">Add to schedule</button>
      <div id="form-error" style="color:#f85149;font-size:12px;margin-top:6px;display:none;"></div>
    </div>

    <div class="scrollable-sidebar">
      <div style="padding: 12px 16px 4px; display:flex; align-items:center; justify-content:space-between;"><span style="font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px;">This week's shifts</span><button id="btn-clear-week" title="Clear this week" style="background:none;border:1px solid var(--border2);color:var(--text3);font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;">Clear week</button></div>
      <div class="event-list" id="event-list"></div>
    </div>
  </aside>

  <!-- Calendar -->
  <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <div class="calendar-wrap" id="calendar-wrap">
      <div class="calendar" id="calendar">
        <div class="cal-header" id="cal-header">
          <div class="cal-header-inner">
            <div class="cal-time-gutter" style="padding:10px 8px 8px; font-size:10px; color:var(--text3); text-align:right;">
              <div id="src-tz-label" style="margin-bottom:2px;"></div>
              <div id="tgt-tz-label" style="color:var(--accent);"></div>
            </div>
            <div class="day-headers" id="day-headers"></div>
          </div>
        </div>
        <div class="cal-body">
          <div class="time-col" id="time-col"></div>
          <div class="days-grid" id="days-grid"></div>
        </div>
      </div>
    </div>
    <div class="legend">
      <span style="font-size:11px; color:var(--text3);">Legend:</span>
      <div class="legend-item"><div class="legend-dot green"></div> Live Chat</div>
      <div class="legend-item"><div class="legend-dot amber"></div> Break</div>
      <div class="legend-item"><div class="legend-stripe"></div> Half-hour boundary</div>
    </div>
  </div>
</div>

<!-- Modal for event detail/delete -->
<div class="modal-bg" id="modal" style="display:none;">
  <div class="modal">
    <h3 id="modal-title">Shift details</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-close">Close</button>
      <button class="btn-danger" id="modal-delete">Delete shift</button>
    </div>

<!-- Month view (hidden by default) -->
<div id="month-view" style="display:none;flex:1;overflow:auto;background:var(--bg);padding:16px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <button id="prev-month" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;">&#8249;</button>
    <span id="month-label" style="font-size:15px;font-weight:500;color:var(--text);"></span>
    <button id="next-month" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;">&#8250;</button>
  </div>
  <div id="month-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">
    <!-- Day headers -->
    <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px;">Mon</div>
    <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px;">Tue</div>
    <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px;">Wed</div>
    <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px;">Thu</div>
    <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px;">Fri</div>
    <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px;">Sat</div>
    <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px;">Sun</div>
  </div>
  <div id="month-cells" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:0;"></div>
</div>

<script>
const HOURS_START = 0;
const HOURS_END = 24;
const CELL_H = 52; // base value; getCellH() reads actual CSS value
function getCellH() {
  return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-h')) || 52;
}
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let currentWeekOffset = 0;
let events = [];
let activeEventId = null;

// Storage
function saveEvents() { localStorage.setItem('shift_events', JSON.stringify(events)); }
function loadEvents() {
  try {
    const raw = JSON.parse(localStorage.getItem('shift_events') || '[]');
    // Only keep v2 events (correct localDateStr format). Drop all legacy data.
    events = raw.filter(e => e._v2 && e.date && typeof e.date === 'string' && e.date.includes('-'));
  } catch(e) { events = []; }
}

// Week start (Monday)
function getWeekStart(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getSettings() {
  return {
    src: document.getElementById('tz-source').value,
    tgt: document.getElementById('tz-target').value
  };
}

// Convert LT time string to target tz, return {h, m}
function convertTime(dayIndex, timeStr, srcTz, tgtTz) {
  const [h, m] = timeStr.split(':').map(Number);
  const weekStart = getWeekStart(currentWeekOffset);
  const d = new Date(weekStart);
  d.setDate(weekStart.getDate() + dayIndex);

  // Step 1: find UTC ms for srcTz local time h:m on day d
  // We do this by formatting d in srcTz and computing the UTC offset
  const srcOffset = getTzOffset(d, h, m, srcTz); // minutes srcTz is ahead of UTC
  const utcMs = Date.UTC(d.getFullYear(), d.getMonth(), d.getDate(), h, m, 0) - srcOffset * 60000;

  // Step 2: format that UTC instant in tgtTz to get local h/m/date
  const utcDate = new Date(utcMs);
  const tgtParts = new Intl.DateTimeFormat('en-US', {
    timeZone: tgtTz,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).formatToParts(utcDate);

  const tgtH = parseInt(tgtParts.find(p => p.type === 'hour').value) % 24;
  const tgtM = parseInt(tgtParts.find(p => p.type === 'minute').value);
  const tgtDay = parseInt(tgtParts.find(p => p.type === 'day').value);

  // Step 3: compute dayShift by comparing calendar date in tgtTz vs srcTz
  const srcParts = new Intl.DateTimeFormat('en-US', {
    timeZone: srcTz,
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).formatToParts(utcDate);
  const srcDay = parseInt(srcParts.find(p => p.type === 'day').value);

  // dayShift: how many days forward/backward relative to the source day
  // Use date difference properly
  const srcDateMs = Date.UTC(
    parseInt(srcParts.find(p => p.type === 'year').value),
    parseInt(srcParts.find(p => p.type === 'month').value) - 1,
    srcDay
  );
  const tgtDateMs = Date.UTC(
    parseInt(tgtParts.find(p => p.type === 'year').value),
    parseInt(tgtParts.find(p => p.type === 'month').value) - 1,
    tgtDay
  );
  const dayShift = Math.round((tgtDateMs - srcDateMs) / 86400000);

  return { h: tgtH, m: tgtM, dayShift };
}

function getTzOffset(baseDate, h, m, tz) {
  // Get UTC offset in minutes for a given time in a given tz
  const d = new Date(Date.UTC(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), h, m, 0));
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    hour: 'numeric', minute: 'numeric',
    hour12: false
  }).formatToParts(d);
  const tzH = parseInt(parts.find(p=>p.type==='hour').value);
  const tzM = parseInt(parts.find(p=>p.type==='minute').value);
  // What UTC time does this tz time correspond to?
  const utcH = d.getUTCHours();
  const utcM = d.getUTCMinutes();
  // offset = tz_local - UTC
  return (tzH * 60 + tzM) - (utcH * 60 + utcM);
}

function timeToStr(h, m) {
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// Generate unique id
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// Format a Date object as YYYY-MM-DD using LOCAL time (not UTC)
function localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

// ── Render calendar header ──
function renderHeader() {
  const ws = getWeekStart(currentWeekOffset);
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  document.getElementById('week-label').textContent = `${formatDate(ws)} – ${formatDate(we)}`;

  const { src, tgt } = getSettings();
  const srcLabel = src.split('/').pop().replace('_',' ');
  const tgtLabel = tgt.split('/').pop().replace('_',' ');
  document.getElementById('src-tz-label').textContent = srcLabel;
  document.getElementById('tgt-tz-label').textContent = tgtLabel;
  document.getElementById('tz-display').textContent = `${srcLabel} → ${tgtLabel}`;

  const today = new Date(); today.setHours(0,0,0,0);
  const dh = document.getElementById('day-headers');
  dh.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const isToday = d.getTime() === today.getTime();
    const col = document.createElement('div');
    col.className = 'day-col-head' + (isToday ? ' today' : '');
    col.innerHTML = `<div class="day-name">${DAY_SHORT[i]}</div><div class="day-num">${d.getDate()}</div>`;
    dh.appendChild(col);
  }
}

// ── Render time column ──
function renderTimeCol() {
  const tc = document.getElementById('time-col');
  tc.innerHTML = '';
  for (let h = HOURS_START; h < HOURS_END; h++) {
    const cell = document.createElement('div');
    cell.className = 'time-cell';
    cell.textContent = `${String(h).padStart(2,'0')}:00`;
    tc.appendChild(cell);
  }
}

// ── Render day lanes ──
function renderDayLanes() {
  const dg = document.getElementById('days-grid');
  dg.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const lane = document.createElement('div');
    lane.className = 'day-lane';
    lane.dataset.day = i;
    for (let h = HOURS_START; h < HOURS_END; h++) {
      const hc = document.createElement('div');
      hc.className = 'hour-cell half-marker';
      lane.appendChild(hc);
    }
    dg.appendChild(lane);
  }
}

// ── Place events on grid ──
function renderEvents() {
  document.querySelectorAll('.cal-event, .shared-cell').forEach(e => e.remove());
  const { src, tgt } = getSettings();
  const CH = getCellH();
  const BG = '#0d1117';
  const COLOR = { livechat: '#1a4a2e', break: '#4a2e08', training: '#1a2e4a', oneonone: '#2e1a4a', meeting: '#1a3a3a', p2p: '#2e1a3a', ppp: '#1a2a1a' };

  const ws = getWeekStart(currentWeekOffset);
  const weekDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    weekDates.push(localDateStr(d));
  }
  // Build segments: each event -> 1 or 2 visual segments (split at midnight if needed)
  const segs = []; // {col, topMin, botMin, type, label, phStart, phEnd, wTop, wBot, ev, isOverflow}

  // Also find events from the day before this week that overflow into col 0
  const dayBeforeWeek = new Date(ws);
  dayBeforeWeek.setDate(ws.getDate() - 1);
  const dayBeforeStr = localDateStr(dayBeforeWeek);

  events.forEach(function(ev) {
    let colIdx = weekDates.indexOf(ev.date);

    // Handle previous-day overflow into this week
    if (colIdx === -1 && ev.date === dayBeforeStr) {
      const sc = convertTime(6, ev.startLT, src, tgt); // use col 6 (Sun prev week) for tz calc
      const ec = convertTime(6, ev.endLT, src, tgt);
      const startMin = sc.h * 60 + sc.m;
      const endMin   = ec.h * 60 + ec.m;
      let dur = endMin - startMin;
      if (dur <= 0) dur += 1440;
      const totalEnd = startMin + dur;
      if (totalEnd > 1440) {
        // This event overflows into the first day of current week
        const label = ev.label || ({livechat:'Live Chat',break:'Break',training:'Training',oneonone:'1-on-1',meeting:'Meeting',p2p:'P2P Session',ppp:'PPP'}[ev.type] || ev.type);
        const phStart = timeToStr(sc.h, sc.m);
        const phEnd   = timeToStr(ec.h, ec.m);
        const wBot    = ec.m === 30;
        segs.push({ col: 0, topMin: 0, botMin: totalEnd - 1440,
          type: ev.type, label: '', phStart, phEnd, wTop: false, wBot, ev, isOverflow: true });
      }
      return; // don't process further
    }

    if (colIdx === -1) return;

    const sc = convertTime(colIdx, ev.startLT, src, tgt);
    const ec = convertTime(colIdx, ev.endLT, src, tgt);

    // If PH start is on a different calendar day than LT date (dayShift != 0),
    // shift the display column accordingly
    const displayCol = ((colIdx + sc.dayShift) % 7 + 7) % 7;
    // Only render if displayCol is valid in this week
    // (if dayShift pushes it out of this week's range, skip — it'll show in prev/next week view)
    if (sc.dayShift < 0 || sc.dayShift > 1) return; // extreme shifts not expected

    const effectiveCol = sc.dayShift !== 0 ? displayCol : colIdx;

    const startMin = sc.h * 60 + sc.m;
    const endMin   = ec.h * 60 + ec.m;
    let dur = endMin - startMin;
    if (dur <= 0) dur += 1440;
    const totalEnd = startMin + dur;
    const phStart  = timeToStr(sc.h, sc.m);
    const phEnd    = timeToStr(ec.h, ec.m);
    const label    = ev.label || ({livechat:'Live Chat',break:'Break',training:'Training',oneonone:'1-on-1',meeting:'Meeting',p2p:'P2P Session',ppp:'PPP'}[ev.type] || ev.type);
    const wTop = sc.m === 30;
    const wBot = ec.m === 30;

    if (totalEnd <= 1440) {
      segs.push({ col: effectiveCol, topMin: startMin, botMin: totalEnd,
        type: ev.type, label, phStart, phEnd, wTop, wBot, ev });
    } else {
      // Crosses midnight: segment 1 ends at 1440, segment 2 starts at 0 on next day
      segs.push({ col: effectiveCol, topMin: startMin, botMin: 1440,
        type: ev.type, label, phStart, phEnd, wTop, wBot: false, ev });
      const nextCol = effectiveCol + 1;
      if (nextCol < 7) {
        // Next day is within same week view
        segs.push({ col: nextCol, topMin: 0, botMin: totalEnd - 1440,
          type: ev.type, label: '', phStart, phEnd, wTop: false, wBot, ev, isOverflow: true });
      }
    }
  });

  // Per column: detect actual time overlaps and assign left/right splits
  for (let col = 0; col < 7; col++) {
    const cs = segs.filter(s => s.col === col);
    if (!cs.length) continue;
    cs.sort((a, b) => a.topMin - b.topMin);

    const lane = document.querySelector('.day-lane[data-day="' + col + '"]');
    if (!lane) continue;

    // Only split into side-by-side columns if BOTH segments are livechat type
    // Non-livechat blocks (break, training, etc.) inside a livechat render on top, not split
    const assigned = cs.map(() => ({ split: false, side: 0 }));
    for (let i = 0; i < cs.length; i++) {
      for (let j = 0; j < i; j++) {
        const overlap = cs[i].topMin < cs[j].botMin - 1 && cs[i].botMin > cs[j].topMin + 1;
        const bothLivechat = cs[i].type === 'livechat' && cs[j].type === 'livechat';
        if (overlap && bothLivechat) {
          assigned[i].split = true; assigned[i].side = 1;
          assigned[j].split = true; assigned[j].side = 0;
        }
      }
    }

    // Find shared transition cells: segA ends at :30, segB starts at that same :30
    // They share the hour cell [floor(:30)] — render it as dual-color diagonal
    const sharedHours = new Set();
    for (let i = 0; i < cs.length; i++) {
      for (let j = 0; j < cs.length; j++) {
        if (i === j) continue;
        if (cs[i].wBot && cs[j].wTop && cs[i].botMin === cs[j].topMin) {
          sharedHours.add(Math.floor(cs[i].botMin / 60) * 60); // e.g. 1200 for 20:00
        }
      }
    }

    cs.forEach(function(seg, idx) {
      const { split, side } = assigned[idx];

      // Snap visual start/end to hour, but exclude shared cells from the block
      // A shared cell is handled separately as a dual-color overlay
      const hourFloorTop = Math.floor(seg.topMin / 60) * 60;
      const hourFloorBot = Math.floor(seg.botMin / 60) * 60;

      const startsAtShared = seg.wTop && sharedHours.has(hourFloorTop);
      const endsAtShared   = seg.wBot && sharedHours.has(hourFloorBot);

      // Visual top: snap to hour, but if shared cell above → start after it
      const visualTop = startsAtShared ? hourFloorTop + 60
                      : seg.wTop       ? hourFloorTop
                      :                  seg.topMin;

      // Visual bot: snap to next hour, but if shared cell below → end before it
      const visualBot = endsAtShared ? hourFloorBot
                      : seg.wBot     ? Math.min(Math.ceil(seg.botMin / 60) * 60, 1440)
                      :                Math.min(seg.botMin, 1440);

      const topPx = (visualTop / 60) * CH;
      const htPx  = ((visualBot - visualTop) / 60) * CH;
      if (htPx < 2) return;

      const el = document.createElement('div');
      el.className = 'cal-event type-' + seg.type;
      el.style.top    = topPx + 'px';
      el.style.height = Math.max(4, htPx - 1) + 'px';
      el.style.zIndex = seg.type === 'livechat' ? '10' : '12';
      if (split) {
        el.style.left  = side === 0 ? '2px' : '50%';
        el.style.right = side === 0 ? '50%' : '2px';
      }

      // Hour divider lines
      let inner = '';
      for (let h = Math.floor(visualTop / 60) + 1; h < Math.ceil(visualBot / 60); h++) {
        const lineTop = (h * 60 - visualTop) / 60 * CH;
        if (lineTop > 0 && lineTop < htPx) {
          inner += '<div style="position:absolute;left:0;right:0;top:' + lineTop +
            'px;height:1px;background:rgba(255,255,255,0.2);z-index:1;pointer-events:none;"></div>';
        }
      }
      // Suppress label if this block's label is already shown in a shared cell above it
      // A shared cell shows the startSeg's label - that's the seg whose topMin matches a sharedHour boundary
      const hourFloorOfTop = Math.floor(seg.topMin / 60) * 60;
      // startsAtShared was computed above: seg.wTop && sharedHours.has(hourFloorOfTop)
      // If startsAtShared, the shared cell at hourFloorOfTop shows this seg's label
      const showLabel = !seg.isOverflow && seg.label && !startsAtShared;
      if (showLabel) {
        inner = '<div class="ev-title" style="position:relative;z-index:3;text-align:right;">' + seg.label + '</div>' +
                '<div class="ev-time"  style="position:relative;z-index:3;text-align:right;">' + seg.phStart + '-' + seg.phEnd + '</div>' +
                inner;
      }
      el.innerHTML = inner;

      // Wedges only if NOT handled by a shared cell
      if (seg.wTop && !startsAtShared) {
        const w = document.createElement('div');
        w.style.cssText = 'position:absolute;top:0;left:0;right:0;height:' + CH + 'px;' +
          'background:' + BG + ';clip-path:polygon(0 0,100% 0,0 100%);pointer-events:none;z-index:2;';
        el.appendChild(w);
      }
      if (seg.wBot && !endsAtShared) {
        const w = document.createElement('div');
        w.style.cssText = 'position:absolute;bottom:0;left:0;right:0;height:' + CH + 'px;' +
          'background:' + BG + ';clip-path:polygon(100% 0,100% 100%,0 100%);pointer-events:none;z-index:2;';
        el.appendChild(w);
      }

      el.addEventListener('click', function() { openModal(seg.ev); });
      lane.appendChild(el);
    });

    // Render shared transition cells — dual-color diagonal
    sharedHours.forEach(function(hf) {
      // Find which seg ends here and which starts here
      const endSeg   = cs.find(s => s.wBot && Math.floor(s.botMin / 60) * 60 === hf);
      const startSeg = cs.find(s => s.wTop && Math.floor(s.topMin / 60) * 60 === hf);
      if (!endSeg || !startSeg) return;

      const c1 = COLOR[endSeg.type];   // top-left triangle (ending event)
      const c2 = COLOR[startSeg.type]; // bottom-right triangle (starting event)
      const topPx = (hf / 60) * CH;

      const cell = document.createElement('div');
      cell.style.cssText = 'position:absolute;left:2px;right:2px;top:' + (topPx - 1) + 'px;height:' + (CH + 1) + 'px;' +
        'overflow:hidden;z-index:11;cursor:pointer;';
      const startLabel = startSeg.label || '';
      const startTime  = startSeg.phStart + '-' + startSeg.phEnd;
      const startColor = startSeg.type==='livechat'?'var(--green-text)':startSeg.type==='break'?'var(--amber-text)':startSeg.type==='training'?'#79b8ff':startSeg.type==='oneonone'?'#c398f5':startSeg.type==='p2p'?'#d4a0f5':startSeg.type==='ppp'?'#a0f5a0':'#56d4d4';
      cell.innerHTML =
        '<div style="position:absolute;inset:0;background:' + c2 + ';"></div>' +
        '<div style="position:absolute;inset:0;background:' + c1 + ';clip-path:polygon(0 0,100% 0,0 100%);"></div>' +
        '<div style="position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,0.2);z-index:3;pointer-events:none;"></div>' +
        '<div style="position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,0.2);z-index:3;pointer-events:none;"></div>' +
        '<div style="position:absolute;bottom:4px;right:4px;z-index:3;pointer-events:none;text-align:right;">' +
          '<div style="font-size:11px;font-weight:600;color:' + startColor + ';">' + startLabel + '</div>' +
          '<div style="font-family:JetBrains Mono,monospace;font-size:10px;opacity:0.8;color:' + startColor + ';">' + startTime + '</div>' +
        '</div>';

      cell.addEventListener('click', function() { openModal(endSeg.ev); });
      lane.appendChild(cell);
    });
  }
}


// ── Sidebar event list ──
function renderSidebar() {
  const { src, tgt } = getSettings();
  const list = document.getElementById('event-list');

  if (events.length === 0) {
    list.innerHTML = '<div class="empty-state">No shifts added yet.<br>Use the form above to add your Hostinger schedule.</div>';
    return;
  }

  // Group events by date, only show current week
  const ws2 = getWeekStart(currentWeekOffset);
  const weekDates2 = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws2); d.setDate(ws2.getDate() + i);
    weekDates2.push(localDateStr(d));
  }

  const byDate = {};
  events.forEach(ev => {
    if (!weekDates2.includes(ev.date)) return;
    if (!byDate[ev.date]) byDate[ev.date] = [];
    byDate[ev.date].push(ev);
  });

  list.innerHTML = '';
  const hasAny = weekDates2.some(d => byDate[d] && byDate[d].length);
  if (!hasAny) {
    list.innerHTML = '<div class="empty-state">No shifts this week.<br>Navigate weeks or add new shifts.</div>';
    return;
  }

  weekDates2.forEach(date => {
    if (!byDate[date]) return;
    const dayEvs = byDate[date].sort((a,b) => a.startLT.localeCompare(b.startLT));
    const dow = dowFromDate(date);
    const dateObj = new Date(date + 'T00:00:00');
    const dateLabel = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    const group = document.createElement('div');
    group.className = 'day-group';
    // Compute overall shift span: earliest PH start to latest PH end across all events that day
    let overallStart = null, overallEnd = null, overallEndMin = -1, overallStartMin = 99999;
    dayEvs.forEach(ev => {
      const sc2 = convertTime(dow, ev.startLT, src, tgt);
      const ec2 = convertTime(dow, ev.endLT,   src, tgt);
      const sMin = sc2.h * 60 + sc2.m;
      let dur2 = (ec2.h * 60 + ec2.m) - sMin;
      if (dur2 <= 0) dur2 += 1440;
      const eMin = sMin + dur2;
      if (sMin < overallStartMin) { overallStartMin = sMin; overallStart = timeToStr(sc2.h, sc2.m); }
      if (eMin > overallEndMin)   { overallEndMin = eMin;   overallEnd = timeToStr(ec2.h, ec2.m); }
    });
    const overallLabel = overallStart && overallEnd
      ? '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--green-text);margin-left:auto;opacity:0.85;">' + overallStart + '–' + overallEnd + ' PH</span>'
      : '';

    group.innerHTML = '<div class="day-group-header" style="display:flex;align-items:center;gap:6px;">' +
      DAYS[dow] + ' <span style="font-weight:400;opacity:.6;">' + dateLabel + '</span>' +
      overallLabel + '</div>';

    dayEvs.forEach(ev => {
      const sc = convertTime(dow, ev.startLT, src, tgt);
      const ec = convertTime(dow, ev.endLT, src, tgt);
      const label = ev.label || (ev.type === 'livechat' ? 'Live Chat' : 'Break');
      const phStr = timeToStr(sc.h,sc.m) + '-' + timeToStr(ec.h,ec.m);

      const row = document.createElement('div');
      row.className = 'shift-row';
      row.innerHTML =
        '<div class="shift-dot ' + ev.type + '"></div>' +
        '<div class="shift-times">' +
          '<div class="shift-lt">' + ev.startLT + '-' + ev.endLT + ' LT</div>' +
          '<div class="shift-ph ' + ev.type + '">' + phStr + ' PH</div>' +
        '</div>' +
        '<div class="shift-type">' + label + '</div>' +
        '<button class="btn-del" data-id="' + ev.id + '" title="Delete">×</button>';

      row.addEventListener('click', function(e) {
        if (e.target.classList.contains('btn-del')) {
          deleteEvent(e.target.dataset.id);
        } else {
          openModal(ev);
        }
      });
      group.appendChild(row);
    });

    list.appendChild(group);
  });
}

function openModal(ev) {
  const { src, tgt } = getSettings();
  const evDow2 = dowFromDate(ev.date);
  const sc = convertTime(evDow2, ev.startLT, src, tgt);
  const ec = convertTime(evDow2, ev.endLT, src, tgt);
  const srcLabel = src.split('/').pop().replace('_',' ');
  const tgtLabel = tgt.split('/').pop().replace('_',' ');
  const label = ev.label || (ev.type === 'livechat' ? 'Live Chat' : 'Break');

  document.getElementById('modal-title').textContent = label;
  document.getElementById('modal-body').innerHTML = `
    <table style="width:100%;font-size:13px;border-collapse:collapse;">
      <tr><td style="color:var(--text2);padding:6px 0;width:120px;">Date</td><td style="font-weight:500;">${new Date(ev.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</td></tr>
      <tr><td style="color:var(--text2);padding:6px 0;">${srcLabel} time</td><td style="font-family:JetBrains Mono,monospace;font-size:13px;">${ev.startLT}–${ev.endLT}</td></tr>
      <tr><td style="color:var(--text2);padding:6px 0;">${tgtLabel} time</td><td style="font-family:JetBrains Mono,monospace;font-size:14px;font-weight:600;color:var(--${ev.type==='livechat'?'green':'amber'}-text);">${timeToStr(sc.h,sc.m)}–${timeToStr(ec.h,ec.m)}</td></tr>
      <tr><td style="color:var(--text2);padding:6px 0;">Type</td><td style="text-transform:capitalize;">${ev.type === 'livechat' ? 'Live Chat' : 'Break'}</td></tr>
    </table>
  `;
  activeEventId = ev.id;
  document.getElementById('modal').style.display = 'flex';
}

function deleteEvent(id) {
  const removing = events.find(e => e.id === id);
  events = events.filter(e => e.id !== id);

  // If deleting a break, merge any adjacent live chat segments on the same day
  if (removing && removing.type !== 'livechat') {
    const date     = removing.date;
    const brkStart = timeToMin(removing.startLT);
    const brkEnd   = timeToMin(removing.endLT);

    const before = events.find(e => e.date === date && e.type === 'livechat' && timeToMin(e.endLT) === brkStart);
    const after  = events.find(e => e.date === date && e.type === 'livechat' && timeToMin(e.startLT) === brkEnd);

    if (before && after) {
      // Merge: extend 'before' to cover 'after', remove 'after'
      before.endLT = after.endLT;
      events = events.filter(e => e.id !== after.id);
    } else if (before) {
      before.endLT = removing.endLT;
    } else if (after) {
      after.startLT = removing.startLT;
    }
  }

  saveEvents();
  renderAll();
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
});
document.getElementById('modal-delete').addEventListener('click', () => {
  if (activeEventId) deleteEvent(activeEventId);
  document.getElementById('modal').style.display = 'none';
});
document.getElementById('modal').addEventListener('click', (e) => {

// ── Form submit ──
document.getElementById('btn-save-event').addEventListener('click', addEvent);

// Convert "HH:MM" to total minutes
function timeToMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function minToTime(m) { return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }

// Get the actual Date object for a day-of-week pill (0=Mon) in the current week view
function getDateForDow(dow) {
  const ws = getWeekStart(currentWeekOffset);
  const d = new Date(ws);
  d.setDate(ws.getDate() + dow);
  return localDateStr(d); // YYYY-MM-DD local
}

// Get day-of-week index (0=Mon) from a YYYY-MM-DD string
function dowFromDate(dateStr) {
  if (!dateStr || !dateStr.includes('-')) return 0;
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return 0;
  return d.getDay() === 0 ? 6 : d.getDay() - 1;
}

function addEvent() {
  const errEl = document.getElementById('form-error');
  const showErr = (msg) => { errEl.textContent = msg; errEl.style.display = 'block'; };
  errEl.style.display = 'none';

  const selectedPills = [...document.querySelectorAll('.day-pill.selected')];
  if (!selectedPills.length) { showErr('Please select at least one day.'); return; }
  const dows = selectedPills.map(p => parseInt(p.dataset.day));

  const startLT = document.getElementById('inp-start').value;
  const endLT   = document.getElementById('inp-end').value;
  const type    = document.getElementById('inp-type').value;
  const label   = document.getElementById('inp-label').value.trim();

  if (!startLT || !endLT) { showErr('Please set start and end times.'); return; }
  if (startLT === endLT)  { showErr('Start and end times must differ.'); return; }

  const newS = timeToMin(startLT);
  const newE = timeToMin(endLT);

  // Validate each selected day
  for (const dow of dows) {
    const date = getDateForDow(dow);
    const dayEvs = events.filter(e => e.date === date);

    if (type === 'livechat') {
      // Block if overlaps any existing event of same type
      const conflict = dayEvs.find(e => e.type === 'livechat' && newS < timeToMin(e.endLT) && newE > timeToMin(e.startLT));
      if (conflict) {
        showErr(new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) +
          ': Live Chat already exists at ' + conflict.startLT + '–' + conflict.endLT);
        return;
      }
    } else {
      // Non-livechat: must be fully inside exactly one livechat block
      // Handle midnight-crossing live chat blocks (e.g. 15:00-00:00 LT)
      const container = dayEvs.find(e => {
        if (e.type !== 'livechat') return false;
        const evS = timeToMin(e.startLT);
        let evE = timeToMin(e.endLT);
        if (evE <= evS) evE += 1440; // crosses midnight
        // newS/newE might also need to be shifted if they're "after midnight" relative to evS
        let adjS = newS, adjE = newE;
        if (adjS < evS) { adjS += 1440; adjE += 1440; }
        return adjS >= evS && adjE <= evE;
      });
      if (!container) {
        showErr('Block must be fully inside a Live Chat block.');
        return;
      }
      // Block if overlaps another non-livechat
      const conflict = dayEvs.find(e => e.type !== 'livechat' && newS < timeToMin(e.endLT) && newE > timeToMin(e.startLT));
      if (conflict) {
        showErr('Overlaps existing ' + conflict.type + ' block at ' + conflict.startLT + '–' + conflict.endLT);
        return;
      }
    }
  }

  // Apply changes per day
  dows.forEach(function(dow) {
    const date = getDateForDow(dow);

    if (type !== 'livechat') {
      // Split any livechat that contains this block
      const toRemove = [], toAdd = [];
      events.forEach(ev => {
        if (ev.date !== date || ev.type !== 'livechat') return;
        const evS = timeToMin(ev.startLT);
        let evE = timeToMin(ev.endLT);
        if (evE <= evS) evE += 1440; // crosses midnight
        let adjS = newS, adjE = newE;
        if (adjS < evS) { adjS += 1440; adjE += 1440; }
        if (adjS >= evS && adjE <= evE) {
          toRemove.push(ev.id);
          if (adjS > evS) toAdd.push({ id: uid(), date, startLT: ev.startLT, endLT: startLT, type: 'livechat', label: ev.label, _v2: true });
          if (adjE < evE) toAdd.push({ id: uid(), date, startLT: endLT, endLT: ev.endLT, type: 'livechat', label: ev.label, _v2: true });
        }
      });
      events = events.filter(e => !toRemove.includes(e.id));
      toAdd.forEach(e => events.push(e));
    }

    events.push({ id: uid(), date, startLT, endLT, type, label, _v2: true });
  });

  console.log('Events after add:', JSON.stringify(events.map(e => ({date:e.date, type:e.type, s:e.startLT, e:e.endLT}))));
  saveEvents();
  renderAll();
  document.getElementById('inp-label').value = '';
  document.querySelectorAll('.day-pill.selected').forEach(p => p.classList.remove('selected'));
}

// ── Week navigation ──
function syncMonthToWeek() {
  const ws = getWeekStart(currentWeekOffset);
  const today = new Date();
  currentMonthOffset = (ws.getFullYear() - today.getFullYear()) * 12 + (ws.getMonth() - today.getMonth());
}

document.getElementById('prev-week').addEventListener('click', () => {
  currentWeekOffset--;
  syncMonthToWeek();
  renderAll();
  if (document.getElementById('month-view').style.display !== 'none') renderMonth();
});
document.getElementById('next-week').addEventListener('click', () => {
  currentWeekOffset++;
  syncMonthToWeek();
  renderAll();
  if (document.getElementById('month-view').style.display !== 'none') renderMonth();
});

// ── Timezone change ──
document.getElementById('tz-source').addEventListener('change', renderAll);
document.getElementById('tz-target').addEventListener('change', renderAll);

function renderAll() {
  renderHeader();

  renderDayLanes();
  renderEvents();
  renderSidebar();
  scrollToFirstEvent();
}

function scrollToFirstEvent() {
  const wrap = document.getElementById('calendar-wrap');
  const { src, tgt } = getSettings();

  let minH = 9; // default scroll to 9am
  if (events.length > 0) {
    events.forEach(ev => {
      const d2 = dowFromDate(ev.date);
      const sc = convertTime(d2, ev.startLT, src, tgt);
      if (sc.h < minH) minH = sc.h;
    });
    minH = Math.max(0, minH - 1);
  }
  setTimeout(() => {
    wrap.scrollTop = minH * getCellH();
  }, 50);
}


// Day pill toggle
document.querySelectorAll('.day-pill').forEach(function(pill) {

    pill.classList.toggle('selected');
  });
});


// ── Month view ──
let currentMonthOffset = 0;

function renderMonth() {
  const today = new Date();
  const d = new Date(today.getFullYear(), today.getMonth() + currentMonthOffset, 1);
  const year  = d.getFullYear();
  const month = d.getMonth();

  document.getElementById('month-label').textContent =
    d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const cells = document.getElementById('month-cells');
  cells.innerHTML = '';

  const firstDay = new Date(year, month, 1);
  // Week starts Monday: getDay() 0=Sun -> shift to Mon-based
  let startDow = firstDay.getDay(); // 0=Sun,1=Mon...
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

  const daysInMonth  = new Date(year, month + 1, 0).getDate();
  const daysInPrev   = new Date(year, month, 0).getDate();
  const { src, tgt } = getSettings();

  // Build a set of which calendar dates (YYYY-MM-DD) have work — based on SOURCE day (LT date)
  // We color the day the shift STARTS in LT, not the converted PH day
  const workDays = {}; // 'YYYY-MM-DD' -> Set of types

      events.forEach(function(ev) {
    if (!workDays[ev.date]) workDays[ev.date] = new Set();
    workDays[ev.date].add(ev.type);
  });

  // Total grid cells: startDow blanks + daysInMonth, round up to full weeks
  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startDow + 1;
    const cell   = document.createElement('div');
    cell.className = 'month-cell';

    let cellDate = null;
    if (dayNum < 1) {
      cell.classList.add('other-month');
      const prevDay = daysInPrev + dayNum;
      cell.innerHTML = '<div class="month-day-num">' + prevDay + '</div>';
    } else if (dayNum > daysInMonth) {
      cell.classList.add('other-month');
      cell.innerHTML = '<div class="month-day-num">' + (dayNum - daysInMonth) + '</div>';
    } else {
      cellDate = new Date(year, month, dayNum);
      const todayD = new Date(); todayD.setHours(0,0,0,0);
      if (cellDate.getTime() === todayD.getTime()) cell.classList.add('today');

      const key   = localDateStr(cellDate);
      const types = workDays[key];

      if (types && types.size > 0) {
        cell.classList.add('has-work');
        // Use the first/primary type for the cell color
        // Priority: livechat > break > training > oneonone > meeting
        const priority = ['livechat','break','training','oneonone','meeting','p2p','ppp'];
        let primary = null;
        for (let p = 0; p < priority.length; p++) {
          if (types.has(priority[p])) { primary = priority[p]; break; }
        }
        if (primary) cell.classList.add('has-work-' + primary);
      }
      cell.innerHTML = '<div class="month-day-num">' + dayNum + '</div>';
    }
    cells.appendChild(cell);
  }
}

document.getElementById('prev-month').addEventListener('click', function() { currentMonthOffset--; renderMonth(); });
document.getElementById('next-month').addEventListener('click', function() { currentMonthOffset++; renderMonth(); });

// Clear week button
document.getElementById('btn-clear-week').addEventListener('click', function() {
  const ws = getWeekStart(currentWeekOffset);
  const weekDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    weekDates.push(localDateStr(d));
  }
  events = events.filter(e => !weekDates.includes(e.date));
  saveEvents();
  renderAll();
});
